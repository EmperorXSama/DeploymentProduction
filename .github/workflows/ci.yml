name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-dotnet:
    name: Build .NET services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore .NET solution
        run: dotnet restore DeploymentDemo.slnx

      - name: Build .NET solution
        run: dotnet build DeploymentDemo.slnx --configuration Release --no-restore

  build-spa:
    name: Build React SPA
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/DeploymentDemo.Spa

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/DeploymentDemo.Spa/package-lock.json

      - name: Install SPA dependencies
        run: npm ci

      - name: Build SPA
        run: npm run build