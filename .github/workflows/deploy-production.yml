name: Deploy Production

on:
  workflow_run:
    workflows:
      - Publish Container Images
    types:
      - completed
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: emperorxsama
  RESOURCE_GROUP: rg-deploymentproduction

  API_APP_NAME: deploymentproduction-api-prod
  BFF_APP_NAME: deploymentproduction-bff-prod
  SPA_APP_NAME: deploymentproduction-spa-prod

jobs:
  deploy-production:
    name: Deploy production Container Apps
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    environment:
      name: production

    steps:
      - name: Set image tag
        run: echo "IMAGE_TAG=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_ENV

      - name: Log in to Azure using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy API image to production
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ${{ env.API_APP_NAME }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/deploymentproduction-api:${{ env.IMAGE_TAG }}
          registryUrl: ${{ env.REGISTRY }}
          registryUsername: ${{ secrets.GHCR_USERNAME }}
          registryPassword: ${{ secrets.GHCR_TOKEN }}

      - name: Deploy BFF image to production
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ${{ env.BFF_APP_NAME }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/deploymentproduction-bff:${{ env.IMAGE_TAG }}
          registryUrl: ${{ env.REGISTRY }}
          registryUsername: ${{ secrets.GHCR_USERNAME }}
          registryPassword: ${{ secrets.GHCR_TOKEN }}

      - name: Deploy SPA image to production
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ${{ env.SPA_APP_NAME }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/deploymentproduction-spa:${{ env.IMAGE_TAG }}
          registryUrl: ${{ env.REGISTRY }}
          registryUsername: ${{ secrets.GHCR_USERNAME }}
          registryPassword: ${{ secrets.GHCR_TOKEN }}